<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLP — My Language Printer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--bg3:#161b22;--bg4:#1c2128;
  --border:#21262d;--border2:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --cyan:#39d0d8;--yellow:#e3b341;--pink:#f778ba;--purple:#bc8cff;
  --mono:'IBM Plex Mono',monospace;--main:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--main);min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px}
.hdr-eye{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:3px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.hdr-eye::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:22px;font-weight:900;margin-bottom:16px}
.hdr-title span{color:var(--cyan)}

.notes-upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px}
.notes-upload-zone:hover,.notes-upload-zone.dragover{border-color:var(--cyan);background:rgba(57,208,216,.04)}
.notes-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.notes-upload-icon{font-size:32px;margin-bottom:6px}
.notes-upload-txt{font-size:13px;color:var(--text2);font-weight:700}
.notes-upload-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.img-prev-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.img-prev-item{position:relative;flex:none}
.img-prev-item img{width:74px;height:74px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.img-prev-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--pink);color:#000;border:none;font-size:11px;cursor:pointer;line-height:1;font-weight:700}

.row{display:flex;gap:8px;margin-bottom:8px}
.inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;outline:none}
.inp:focus{border-color:var(--cyan)}
select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;margin-bottom:8px}

.btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;background:var(--pink);color:#000;margin-top:4px;transition:transform .15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.result{margin-top:16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;display:none}
.result.show{display:block}
.result-label{font-family:var(--mono);font-size:10px;color:var(--yellow);letter-spacing:2px;margin-bottom:10px}
.result-text{white-space:normal;font-size:14px;line-height:1.9;color:var(--text)}
.result-text .summary{background:rgba(57,208,216,.08);border-left:3px solid var(--cyan);padding:10px 14px;border-radius:6px;margin-bottom:14px;font-weight:700;color:var(--cyan)}
.result-text h3{font-size:15px;font-weight:900;color:var(--yellow);margin:16px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.result-text p{margin-bottom:8px;color:var(--text)}
.result-text ul{margin:6px 0 10px 18px}
.result-text li{margin-bottom:4px}
.result-text strong{color:var(--pink)}
.result-text table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.result-text th{background:var(--bg4);color:var(--cyan);padding:7px 10px;border:1px solid var(--border2);text-align:left;font-family:var(--mono);font-size:11px}
.result-text td{padding:7px 10px;border:1px solid var(--border);color:var(--text)}
.ldots{display:flex;gap:5px;justify-content:center;padding:20px}
.ldots .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:dotpulse 1.2s infinite}
.ldots .dot:nth-child(2){animation-delay:.2s}
.ldots .dot:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.ph{text-align:center;padding:24px 12px;color:var(--text3);font-size:13px;line-height:1.8}
.ph span{color:var(--cyan);font-family:var(--mono);font-size:11px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#3fb950;color:#000;font-family:var(--mono);font-size:11px;font-weight:700;padding:8px 18px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr-eye">// TENPEAK · MLP</div>
  <div class="hdr-title">My <span>Language</span> Printer</div>

  <div class="notes-upload-zone" id="upload-zone">
    <input type="file" id="file-inp" accept="image/*" multiple onchange="handleUpload(this)">
    <div class="notes-upload-icon" id="upload-icon">📖</div>
    <div class="notes-upload-txt" id="upload-txt">교재 사진을 올려봐</div>
    <div class="notes-upload-sub">여러 장 가능 · 표/도식 다 OK</div>
  </div>
  <div class="img-prev-row" id="img-preview"></div>

  <div class="row">
    <input class="inp" id="subject-input" placeholder="과목 (예: 한국사)">
    <input class="inp" id="unit-input" placeholder="단원 (선택)">
  </div>
  <select id="style-select">
    <option value="암기용">💥 암기용 — 핵심만 날카롭게, 내 말투</option>
    <option value="흐름이해">🧩 흐름 이해 — 전후 관계/인과 중심</option>
    <option value="시험직전">⚡ 시험 직전 — 초압축 키워드</option>
  </select>

  <button class="btn" id="run-btn" onclick="runMLP()">🖨️ 내 언어로 출력</button>

  <div class="result" id="result">
    <div class="result-label">// MY LANGUAGE</div>
    <div class="result-text" id="result-text">
      <div class="ph">아직 변환 전이야!<br><span>내 언어로 출력</span> 눌러봐 🔥</div>
    </div>
    <div id="result-actions" style="display:none;margin-top:12px;display:none;gap:8px">
      <button onclick="printMLP()" style="flex:1;padding:10px;border:none;border-radius:8px;background:var(--cyan);color:#000;font-weight:700;font-size:13px;cursor:pointer">🖨️ 인쇄 / PDF 저장</button>
      <button onclick="copyMLP()" id="copy-btn" style="flex:1;padding:10px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text);font-weight:700;font-size:13px;cursor:pointer">📋 복사</button>
    </div>
  </div>
</div>

<script>
const AI_URL = 'http://10.1.1.60:8000/v1/chat/completions';
const AI_MODEL = 'gemma-4-26B-A4B-it-qat-8bit';
const apiKey = 'cjddk0509';

let imgs = [];

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.opacity='0', 2200);
}

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('dragover');});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',e=>{
  e.preventDefault();zone.classList.remove('dragover');
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
  if(!files.length) return;
  const dt=new DataTransfer();
  files.forEach(f=>dt.items.add(f));
  document.getElementById('file-inp').files=dt.files;
  handleUpload(document.getElementById('file-inp'));
});

function handleUpload(input) {
  const files = [...input.files];
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      imgs.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        renderPreview();
        document.getElementById('upload-icon').textContent = '✅';
        document.getElementById('upload-txt').textContent = `${imgs.length}장 선택됨 — 다시 누르면 추가`;
        showToast('사진 추가됨!');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPreview() {
  document.getElementById('img-preview').innerHTML = imgs.map((src,i) => `
    <div class="img-prev-item">
      <img src="${src}">
      <button class="img-prev-del" onclick="removeImg(${i})">✕</button>
    </div>`).join('');
}

function removeImg(i) {
  imgs.splice(i,1);
  renderPreview();
  if (!imgs.length) {
    document.getElementById('upload-icon').textContent = '📖';
    document.getElementById('upload-txt').textContent = '교재 사진을 올려봐';
  }
}

async function runMLP() {
  if (!imgs.length) { showToast('교재 사진을 올려줘!'); return; }

  const subject = document.getElementById('subject-input').value.trim();
  const unit = document.getElementById('unit-input').value.trim();
  const style = document.getElementById('style-select').value;

  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '변환 중...';
  document.getElementById('result').classList.add('show');
  document.getElementById('result-text').innerHTML = `<div class="ldots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

  const styleGuide = {
    '암기용': '핵심 개념과 흐름만 골라서, 학생 본인의 말투(이모지·드립·줄임말 OK)로 완전히 새롭게 풀어 써줘. 절대 원문 문장을 그대로 가져오지 말고, 개념을 이해한 뒤 자기 언어로 재구성해.',
    '흐름이해': '사건/개념 사이의 인과관계와 전후 흐름을 화살표(→)로 연결해서, 왜 이게 다음 단계로 이어지는지 스토리텔링 하듯 재구성해줘. 원문 표현 대신 비유나 쉬운 말로 바꿔서 설명해.',
    '시험직전': '키워드와 숫자/연도/핵심 명칭만 초압축해서 나열해줘. 문장 최소화, 핵심 단어 위주.'
  };

  const sys = `너는 학생이 올린 교재 사진의 내용을 분석해서, 학생 자신의 언어로 완전히 새롭게 재구성해주는 AI야.

**가장 중요한 규칙: 정확성 우선**
- 사진에 실제로 적혀있는 내용(소제목, 표, 도식, 연도, 인물명, 사건명)을 반드시 그대로 반영해.
- 사진 속 단원 제목이나 단원 번호만 보고 "이 단원은 보통 이런 내용이겠지"라고 일반 지식으로 추측해서 쓰면 절대 안 돼. 추측성 내용은 심각한 오류야.
- 사진에 있는 표/항목/구분을 빠짐없이 다뤄야 해. 사진에 없는 사건이나 인물을 임의로 추가하지 마.
- 사진 글씨가 일부 안 보이거나 불확실하면, 추측해서 채우지 말고 "(이 부분 사진이 잘 안 보여서 확인 필요)"라고 표시해.

**재구성 방식**
- 원문 문장을 그대로 옮기거나 단어만 살짝 바꾸는 것은 금지. 사진 속 정확한 정보를 바탕으로 학생의 말투로 새로 써.
- ${styleGuide[style]}
- 표/도식/화살표 구조가 있으면 그 관계를 살려서 재구성해.

**출력 형식 (반드시 HTML로만 출력, 다른 텍스트/마크다운/코드블록 금지):**
- 맨 위에 한 줄 요약: <div class="summary">📌 한 줄 요약: [내용]</div>
- 소제목: <h3>[제목]</h3>
- 본문 문단: <p>[내용]</p>
- 목록: <ul><li>[항목]</li></ul>
- 비교표: <table><tr><th>항목</th><th>내용</th><th>의미</th></tr><tr><td>...</td>...</tr></table>
- 강조: <strong>[중요 키워드]</strong>
- script, style 태그는 절대 금지.
- HTML 태그 외 다른 텍스트(마크다운, 코드블록, 설명)는 출력하지 마.`;

  const userContent = [];
  let textPart = '';
  if (subject) textPart += `과목: ${subject}\n`;
  if (unit) textPart += `단원: ${unit}\n`;
  textPart += '위 교재 내용을 내 언어로 재구성해줘.';
  userContent.push({ type:'text', text: textPart });
  imgs.forEach(src => userContent.push({ type:'image_url', image_url:{ url: src } }));

  try {
    const res = await fetch(AI_URL, {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body: JSON.stringify({ model: AI_MODEL, messages:[{role:'system',content:sys},{role:'user',content:userContent}] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    let html = data.choices[0].message.content.trim();
    // 혹시 마크다운 코드블록으로 감싸져 있으면 제거
    html = html.replace(/^```html?\n?/i,'').replace(/```$/,'').trim();
    document.getElementById('result-text').innerHTML = html;
    document.getElementById('result-actions').style.display = 'flex';
  } catch(e) {
    document.getElementById('result-text').innerHTML = `<div class="ph">⚠ 오류: <span>${e.message}</span></div>`;
  }
  btn.disabled = false; btn.textContent = '🖨️ 내 언어로 출력';
}

function printMLP() {
  const subject = document.getElementById('subject-input').value.trim() || 'MLP 정리노트';
  const unit = document.getElementById('unit-input').value.trim();
  const style = document.getElementById('style-select').value;
  const el = document.getElementById('result-text');
  const content = el.innerHTML;
  if (!content || el.innerText.includes('아직 변환 전이야')) { showToast('먼저 출력해봐!'); return; }

  const title = subject + (unit ? ` — ${unit}` : '');
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  const printWin = window.open('', '_blank');
  printWin.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  body{font-family:'Noto Sans KR',sans-serif;padding:32px 40px;color:#1a1a1a;line-height:1.9;font-size:13px;max-width:780px;margin:0 auto}
  .header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #1a1a1a;padding-bottom:8px;margin-bottom:6px}
  .header h1{font-size:17px;margin:0;font-weight:900}
  .header span{font-size:10px;color:#888;font-family:monospace}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;margin-bottom:16px;display:inline-block;font-family:monospace}
  .summary{background:#f0f8ff;border-left:3px solid #2E75B6;padding:8px 12px;border-radius:4px;margin-bottom:14px;font-weight:700;color:#1a4a7a;font-size:13px}
  h3{font-size:14px;font-weight:900;margin:14px 0 5px;border-bottom:1px solid #ddd;padding-bottom:3px;color:#1a1a1a}
  p{margin-bottom:7px}
  ul{margin:5px 0 8px 18px}
  li{margin-bottom:3px}
  strong{color:#c0392b}
  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
  th{background:#2E75B6;color:#fff;padding:6px 8px;border:1px solid #2E75B6;text-align:left;font-size:11px}
  td{padding:6px 8px;border:1px solid #ccc}
  tr:nth-child(even) td{background:#f8f8f8}
  @media print{body{padding:16px 20px}}
</style></head><body>
<div class="header"><h1>${title}</h1><span>${dateStr}</span></div>
<div class="badge">My Language Printer · ${style}</div>
${content}
</body></html>`);
  printWin.document.close();
  setTimeout(() => printWin.print(), 600);
}

function copyMLP() {
  const content = document.getElementById('result-text').innerText;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 복사됨!';
    btn.style.color = 'var(--cyan)';
    setTimeout(() => { btn.textContent = '📋 복사'; btn.style.color = ''; }, 2000);
  });
}
</script>
</body>
</html>
